name: secret-scan

# D0g — dogfooding the same portable gitleaks gate that
# trellis-dev-system emits to consumer repos via
# ``devsystem/github/workflows/secret-scan.yml``. We adopt it here so
# the dev-system repo holds itself to the same secret-handling
# discipline it teaches future projects. Verbatim where practical;
# divergence (e.g. caching) would silently weaken what we ship.
#
# Authoritative source for the consumer-facing copy:
#   devsystem/github/workflows/secret-scan.yml
# Tests (tests/test_repo_hardening_present.py) assert this workflow
# stays aligned with that source.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write   # SARIF upload to code-scanning
  # ``codeql-action/upload-sarif@v3`` issues a workflow-runs read
  # against the GitHub REST API for fingerprinting + duplicate
  # detection. Without ``actions: read`` it errors with
  # "Resource not accessible by integration" and fails the job
  # even when the underlying gitleaks scan was clean.
  actions: read

jobs:
  gitleaks:
    name: gitleaks (worktree + SARIF)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # ``--no-git`` on the worktree mirrors what a local pre-commit
          # hook would scan — same gate, two surfaces.
          fetch-depth: 1

      # Pin gitleaks to a specific binary release. Bump deliberately
      # when the release notes show a relevant rule change.
      - name: Install gitleaks 8.30.1
        run: |
          set -euo pipefail
          GITLEAKS_VERSION=8.30.1
          curl -sSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks (SARIF for code-scanning + JSON for log)
        id: scan
        run: |
          set -euo pipefail
          # ``--exit-code 1`` (gitleaks 8.x default) reds the workflow
          # on ANY un-allowlisted hit. ``--redact`` masks the matched
          # value in the SARIF so a re-leak through code-scanning
          # doesn't republish the secret content.
          gitleaks detect \
            --source . \
            --no-git \
            --config .gitleaks.toml \
            --report-format sarif \
            --report-path /tmp/gitleaks.sarif \
            --redact \
            --no-banner
          gitleaks detect \
            --source . \
            --no-git \
            --config .gitleaks.toml \
            --report-format json \
            --report-path /tmp/gitleaks.json \
            --redact \
            --no-banner

      - name: Upload SARIF to code-scanning
        # Best-effort enrichment: surfaces gitleaks findings in the
        # GitHub Security tab WHEN the repo has code-scanning
        # enabled. When it doesn't (common on personal / free-tier
        # repos), upload-sarif errors with "Code scanning is not
        # enabled". The gate itself is the gitleaks SCAN step above
        # (it exits 1 on any un-allowlisted hit), so SARIF upload is
        # not load-bearing. continue-on-error lets the workflow
        # remain portable across both states.
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: /tmp/gitleaks.sarif
          category: gitleaks

      - name: Upload JSON report (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: /tmp/gitleaks.json
          retention-days: 14
