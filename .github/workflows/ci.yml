name: ci

# Minimal CI for the trellis-dev-system D0a skeleton. No deployment,
# no Docker, no Anthropic API. Just static + test gates.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: pytest + ruff + compile
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies (pytest + ruff stdlib-friendly)
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest ruff

      - name: Byte-compile (catch any syntax-level defects)
        run: python -m compileall -q .

      - name: ruff lint
        run: python -m ruff check .

      - name: pytest
        run: python -m pytest -q
