name: secret-scan

# Portable secret-scanner gate. Runs gitleaks on every push to main
# and every PR; uploads SARIF to GitHub code-scanning so findings
# show in the Security tab. Pinned binary install (no @latest) for
# supply-chain hygiene. Verbatim across consumer projects.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write   # SARIF upload to code-scanning

jobs:
  gitleaks:
    name: gitleaks (worktree + SARIF)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # gitleaks on the worktree (`--no-git`) is what the local
          # pre-commit hook also runs — same gate, two surfaces.
          fetch-depth: 1

      # Pin gitleaks to a specific binary release. Bump deliberately
      # when the release notes show a relevant rule change.
      - name: Install gitleaks 8.30.1
        run: |
          set -euo pipefail
          GITLEAKS_VERSION=8.30.1
          curl -sSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks (SARIF for code-scanning + JSON for log)
        id: scan
        run: |
          set -euo pipefail
          # ``--exit-code 1`` (gitleaks 8.x default) reds the workflow
          # on ANY un-allowlisted hit. ``--redact`` masks the matched
          # value in the SARIF so a re-leak through code-scanning
          # doesn't republish the secret content.
          gitleaks detect \
            --source . \
            --no-git \
            --config .gitleaks.toml \
            --report-format sarif \
            --report-path /tmp/gitleaks.sarif \
            --redact \
            --no-banner
          gitleaks detect \
            --source . \
            --no-git \
            --config .gitleaks.toml \
            --report-format json \
            --report-path /tmp/gitleaks.json \
            --redact \
            --no-banner

      - name: Upload SARIF to code-scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: /tmp/gitleaks.sarif
          category: gitleaks

      - name: Upload JSON report (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: /tmp/gitleaks.json
          retention-days: 14
